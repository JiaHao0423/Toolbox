# Docker Compose 內部網路：使用服務名稱連線
# 啟動：docker compose up -d --build

spring.datasource.url=jdbc:mysql://mysql:3306/${MYSQL_DATABASE:toolbox}?characterEncoding=UTF-8&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:0000}

spring.data.redis.host=redis
spring.data.redis.port=6379

spring.mail.host=mailpit
spring.mail.port=1025

management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true

server.port=${PORT:8080}
