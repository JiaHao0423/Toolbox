# Connect to Docker Compose on localhost (mysql 3308, redis 6380, mailpit 1025)
# IntelliJ Run Configuration -> Active profiles: docker

spring.datasource.url=jdbc:mysql://localhost:${MYSQL_PORT:3308}/${MYSQL_DATABASE:toolbox}?characterEncoding=UTF-8&serverTimezone=Asia/Taipei&allowPublicKeyRetrieval=true&useSSL=false
spring.datasource.username=root
spring.datasource.password=${MYSQL_ROOT_PASSWORD:0000}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=none
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

spring.data.redis.host=localhost
spring.data.redis.port=${REDIS_PORT:6380}
spring.data.redis.timeout=3s

spring.mail.host=localhost
spring.mail.port=${MAILPIT_SMTP_PORT:1025}
spring.mail.username=
spring.mail.password=
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
